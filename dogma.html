<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ROAD BIKES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body { background: #f5f5f5; color: #111; }

    header {
      background: black;
      color: white;
      padding: 20px 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a { color: white; text-decoration: none; font-weight: bold; }

    h1 { text-align: center; margin: 40px 0; font-size: 32px; }

  
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
      padding: 0 10%;
      margin-bottom: 60px;
    }

    .product-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.2s ease;
      text-decoration: none;
      color: #111;
      display: block;
    }


    .product-card img {
      width: 100%;
      display: block;
    }

    .product-card h3 {
      padding: 15px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<header>
  <a href="products.html">Back to Products</a>
</header>

<h1>DOGMA SERIES</h1>

<section class="product-grid">

  <a href="" class="product-card">
    <img src="images/dogma 1.png" alt="Dogma Series">
    <h3>DOGMA F DURA ACE Di2</h3>
  </a>

  <a href="" class="product-card">
    <img src="images/dogma 2.png" alt="F9 Series">
    <h3>DOGMA F EDIZIONE SPECIALE</h3>
  </a>

  <a href="" class="product-card">
    <img src="images/dogma 3.png" alt="">
    <h3>DOGMA F SRAM RED ETAP AXS</h3>
  </a>

  <a href="" class="product-card">
    <img src="images/dogma 4.png" alt="Marvel Series">
    <h3>PINARELLO X9 SHIMANO DURA ACE Di2</h3>
  </a>



</section>

<footer style="background:black; color:white; text-align:center; padding:20px;">
  © 2026 BikeBrand
</footer>

</body>
</html>
